    app.kubernetes.io/instance: oai-du-level1
    app.kubernetes.io/version: "develop"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: f1c
      port: 38472
      targetPort: 38472
      protocol: SCTP
    - name: f1u
      port: 2152
      targetPort: 2152
      protocol: UDP
  selector:
    app.kubernetes.io/name: oai-du-level1
    app.kubernetes.io/instance: oai-du-level1
