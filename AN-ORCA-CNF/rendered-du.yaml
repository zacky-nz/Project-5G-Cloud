# Source: oai-du-level1/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-du-level1
  labels:
    helm.sh/chart: oai-du-level1-1.0.0
    app.kubernetes.io/name: oai-du-level1
    app.kubernetes.io/instance: oai-du-level1
    app.kubernetes.io/version: "develop"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 
  selector:
    matchLabels:
      app.kubernetes.io/name: oai-du-level1
      app.kubernetes.io/instance: oai-du-level1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oai-du-level1
        app.kubernetes.io/instance: oai-du-level1
        app: oai-du
      annotations:
        k8s.v1.cni.cncf.io/networks: >-
          [{
                 "name": "oai-du-level1-f1",
                 "interface": "f1"
          }
          ]
    spec:
      securityContext:
        runAsGroup: 0
        runAsUser: 0
      imagePullSecrets:
        
        - name: regcred
      containers:
      - name: gnbdu
        image: "docker.io/oaisoftwarealliance/oai-gnb:2023.w49"
        volumeMounts:
          - mountPath: /opt/oai-gnb/etc
            name: configuration
        securityContext:
           privileged: true
        ports:
        - containerPort: 4043
          name: rfsim
          protocol: TCP
        - containerPort: 38472
          name: f1c
          protocol: SCTP
        - containerPort: 2152
          name: f1u
          protocol: UDP
        command: [ "/bin/bash", "-c" ]
        args:
         -  CU_IP_ADDRESS=$(getent hosts $CU_HOST | awk '{print $1}')
            CU_IP_ADDRESS=$(if [[ $CU_IP_ADDRESS ]]; then echo $CU_IP_ADDRESS; else echo $CU_HOST;fi)
            F1_DU_IP_ADDRESS=$(ip -f inet addr show $F1_IF_NAME | grep -o "inet [0-9]*\.[0-9]*\.[0-9]*\.[0-9]*" | grep -o "[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*");
            sed -e s/@F1_DU_IP_ADDRESS@/$F1_DU_IP_ADDRESS/g
                -e s/@CU_IP_ADDRESS@/$CU_IP_ADDRESS/g
                /opt/oai-gnb/etc/du.conf | tee /tmp/du.conf;
            exec /opt/oai-gnb/bin/nr-softmodem -O /tmp/du.conf $USE_ADDITIONAL_OPTIONS;
        env:
          - name: TZ
            value: UTC
          - name: USE_ADDITIONAL_OPTIONS
            value: --sa --rfsim --rfsimulator.serveraddr 0.0.0.0 --rfsimulator.serverport 4043 -r 106 --numerology 1 -C 3619200000 --nokrnmod --log_config.global_log_options level,nocolor,time

          - name: F1_IF_NAME
            value: f1
          - name: CU_HOST
            value: 172.20.1.212
      volumes:
      - configMap:
          name: oai-du-level1-configmap
        name: configuration
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      serviceAccountName: 
      terminationGracePeriodSeconds: 5
      nodeName: awanbaru
---
