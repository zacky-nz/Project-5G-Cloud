kubernetesType: Vanilla

nfimage:
  repository: docker.io/oaisoftwarealliance/oai-gnb
  version: 2023.w49
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: "regcred"

serviceAccount:
  create: true
  annotations: {}
  name: ""

multus:
  defaultGateway: ""
  f1Interface:
    create: true 
    IPadd: "172.20.1.213"
    Netmask: "24"
    hostInterface: "eth0"
  ruInterface:
    create: false
    IPadd:  ""  # "172.20.1.213"
    Netmask: ""
    hostInterface: "eth0"

config:
  mountConfig: true
  timeZone: "UTC"
  useAdditionalOptions: >
    --sa
    --rfsim
    --rfsimulator.serveraddr 0.0.0.0
    --rfsimulator.serverport 4043
    -r 106
    --numerology 1
    -C 3619200000
    --nokrnmod
    --log_config.global_log_options level,nocolor,time
  gnbId: "0xe11"
  duName: "oai-du-rfsim"
  duId: "0xe12"
  cellId: "12345678L"
  mcc: "208"
  mnc: "99"
  tac: "0xa001"
  sst: "1"
  sd: "0xFFFFFF"
  usrp: rfsim
  
  f1IfName: "f1"
  cuHost: "172.20.1.212"
  f1cuPort: "2152"
  f1duPort: "2152"
  f1cLocalPort: "500"
  f1cRemotePort: "501"

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0

start:
  gnbdu: true
  tcpdump: false

includeTcpDumpContainer: false

tcpdumpimage:
   repository: docker.io/corfr/tcpdump
   version: latest
   pullPolicy: IfNotPresent

resources:
  define: false
  limits:
    nf:
      cpu: 2000m
      memory: 2Gi
    tcpdump:
      cpu: 200m
      memory: 128Mi
  requests:
    nf:
      cpu: 2000m
      memory: 2Gi
    tcpdump:
      cpu: 100m
      memory: 128Mi

tolerations: []

affinity: {}

terminationGracePeriodSeconds: 5

nodeSelector: {}

nodeName: awanbaru