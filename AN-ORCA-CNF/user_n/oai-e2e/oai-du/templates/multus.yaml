{{- if .Values.multus.f1Interface.create }}
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Chart.Name }}-f1
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "ipvlan",
    "master": "{{ default "eth0" .Values.multus.f1Interface.master }}",
    "mode": "l2",
    "ipam": {
      "type": "static",
      "addresses": [
        {
          "address": {{- cat .Values.multus.f1Interface.IPadd "/" .Values.multus.f1Interface.Netmask | nospace | quote }}
          {{- if .Values.multus.f1Interface.Gateway }}
          ,"gateway": {{- .Values.multus.f1Interface.Gateway | quote }}
          {{- end }}
        }
      ]
      {{- if .Values.multus.f1Interface.routes }}
      ,"routes": {{- .Values.multus.f1Interface.routes | toJson }}
      {{- end }}
    }
  }'
{{- end }}

{{- if .Values.multus.ruInterface.create }}
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Chart.Name }}-ru
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "ipvlan",
    "master": "{{ default "eth0" .Values.multus.ruInterface.master }}",
    {{- if .Values.multus.ruInterface.mtu }}
    "mtu": {{ .Values.multus.ruInterface.mtu }},
    {{- end }}
    "mode": "l2",
    "ipam": {
      "type": "static",
      "addresses": [
        {
          "address": {{- cat .Values.multus.ruInterface.IPadd "/" .Values.multus.ruInterface.Netmask | nospace | quote }}
          {{- if .Values.multus.ruInterface.Gateway }}
          ,"gateway": {{- .Values.multus.ruInterface.Gateway | quote }}
          {{- end }}
        }
      ]
      {{- if .Values.multus.ruInterface.routes }}
      ,"routes": {{- .Values.multus.ruInterface.routes | toJson }}
      {{- end }}
    }
  }'
{{- end }}