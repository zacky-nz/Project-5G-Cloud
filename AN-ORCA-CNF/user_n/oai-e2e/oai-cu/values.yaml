kubernetesType: Vanilla

nfimage:
  repository: docker.io/oaisoftwarealliance/oai-gnb
  version: 2024.w25
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: "regcred"

serviceAccount:
  create: true
  annotations: {}
  name: ""

multus:
  defaultGateway: ""
  f1Interface:
    create: true
    IPadd: "172.20.0.212"
    Netmask: "16"
    hostInterface: "eth0"
  n2Interface:
    create: true
    IPadd: "172.20.0.210"
    Netmask: "16"
    hostInterface: "eth0"
  n3Interface:
    create: true
    IPadd: "172.20.0.211"
    Netmask: "16"
    hostInterface: "eth0"

config:
  mountConfig: true
  timeZone: "UTC"
  useAdditionalOptions: "--sa --log_config.global_log_options level,nocolor,time"

  cuName: "oai-cu"
  cuId: "0xe10"
  cellId: "12345678L"

  mcc: "208"
  mnc: "99"
  tac: "1"
  sst: "1"
  sd: "0xFFFFFF"

  duHost: "172.20.0.213"   
  amfhost: "172.20.0.200"  

  n2IfName: "n1"
  n3IfName: "n2"
  f1IfName: "n3"

  f1cuPort: "2152"
  f1duPort: "2152"

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0

start:
  gnbcu: true
  tcpdump: false

includeTcpDumpContainer: false

tcpdumpimage:
  repository: docker.io/corfr/tcpdump
  version: latest
  pullPolicy: IfNotPresent

resources:
  define: false
  limits:
    nf:
      cpu: 100m
      memory: 128Mi
    tcpdump:
      cpu: 100m
      memory: 128Mi
  requests:
    nf:
      cpu: 100m
      memory: 128Mi
    tcpdump:
      cpu: 100m
      memory: 128Mi

tolerations: []

affinity: {}

terminationGracePeriodSeconds: 5

nodeSelector: {}

nodeName: awanbaru