# Source: oai-cu-level1/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oai-cu-level1
  labels:
    helm.sh/chart: oai-cu-level1-2.0.0
    app.kubernetes.io/name: oai-cu-level1
    app.kubernetes.io/instance: oai-cu-level1
    app.kubernetes.io/version: "develop"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oai-cu-level1
      app.kubernetes.io/instance: oai-cu-level1

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app.kubernetes.io/name: oai-cu-level1
        app.kubernetes.io/instance: oai-cu-level1
        app: oai-cu
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            { "name": "oai-cu-level1-f1", "interface": "f1" },
            { "name": "oai-cu-level1-n3", "interface": "n3" },
            { "name": "oai-cu-level1-n2", "interface": "n2" }
          ]

    spec:
      securityContext:
        runAsGroup: 0
        runAsUser: 0
      imagePullSecrets:
        - name: regcred

      containers:
        - name: gnbcu
          image: "docker.io/oaisoftwarealliance/oai-gnb:2024.w25"
          securityContext:
            privileged: true

          volumeMounts:
            - mountPath: /opt/oai-gnb/etc
              name: configuration

          ports:
            - name: n3
              containerPort: 2152
              protocol: UDP
            - name: n2
              containerPort: 36412
              protocol: SCTP
            - name: f1c
              containerPort: 501
              protocol: SCTP
            - name: f1u
              containerPort: 2152
              protocol: UDP
          command: ["/bin/bash", "-c"]
          args:
            - |
              AMF_IP_ADDRESS=$(getent hosts $AMF_HOST | awk '{print $1}');
              AMF_IP_ADDRESS=$(if [[ $AMF_IP_ADDRESS ]]; then echo $AMF_IP_ADDRESS; else echo $AMF_HOST; fi);
              N2_IP_ADDRESS=$(ip -f inet addr show $N2_IF_NAME | grep -o "inet [0-9]*\.[0-9]*\.[0-9]*\.[0-9]*" | awk '{print $2}' | cut -d/ -f1);
              N3_IP_ADDRESS=$(ip -f inet addr show $N3_IF_NAME | grep -o "inet [0-9]*\.[0-9]*\.[0-9]*\.[0-9]*" | awk '{print $2}' | cut -d/ -f1);
              F1_IP_ADDRESS=$(ip -f inet addr show $F1_IF_NAME | grep -o "inet [0-9]*\.[0-9]*\.[0-9]*\.[0-9]*" | awk '{print $2}' | cut -d/ -f1);
              sed -e s/@N2_IP_ADDRESS@/$N2_IP_ADDRESS/g \
                  -e s/@N3_IP_ADDRESS@/$N3_IP_ADDRESS/g \
                  -e s/@F1_IP_ADDRESS@/$F1_IP_ADDRESS/g \
                  -e s/@AMF_IP_ADDRESS@/$AMF_IP_ADDRESS/g \
                  /opt/oai-gnb/etc/cu.conf | tee /tmp/cu.conf;
              exec /opt/oai-gnb/bin/nr-softmodem -O /tmp/cu.conf $USE_ADDITIONAL_OPTIONS;

          env:
            - name: DU_HOST
              value: "172.20.0.213"
            - name: TZ
              value: "UTC"
            - name: USE_ADDITIONAL_OPTIONS
              value: "--sa --log_config.global_log_options level,nocolor,time"
            - name: OAI_GDBSTACKS
              value: "1"
            - name: AMF_HOST
              value: "172.20.0.200"
            - name: N2_IF_NAME
              value: "n2"
            - name: N3_IF_NAME
              value: "n3"
            - name: F1_IF_NAME
              value: "f1"

      volumes:
        - name: configuration
          configMap:
            name: oai-cu-level1-configmap

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      serviceAccountName: oai-cu-level1-sa
      terminationGracePeriodSeconds: 5
      nodeName: awanbaru
