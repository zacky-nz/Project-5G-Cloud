# Source: oai-cu-level1/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: oai-cu-level1-configmap
data:
  #Taken from --> https://gitlab.eurecom.fr/oai/openairinterface5g/-/blob/develop/ci-scripts/conf_files/gnb-cu.sa.band78.106prb.conf
  cu.conf: |
      Active_gNBs = ( "oai-cu");
      # Asn1_verbosity, choice in: none, info, annoying
      Asn1_verbosity = "none";
      Num_Threads_PUSCH = 8;

      gNBs =
      (
       {
          ////////// Identification parameters:
          gNB_ID = 0xe10; 

      #     cell_type =  "CELL_MACRO_GNB";

          gNB_name  =  "oai-cu";

          // Tracking area code, 0x0000 and 0xfffe are reserved values
          tracking_area_code  = 40961;
          plmn_list = ({ mcc = 208; mnc = 99; mnc_length = 2; snssaiList = ({ sst = 1; }) });

          nr_cellid = 12345678L;

          tr_s_preference = "f1";

          local_s_if_name = "f1";
          local_s_address = "172.20.0.212";
          remote_s_address = "172.20.0.213";
          local_s_portc   = 501;
          local_s_portd   = 2152;
          remote_s_portc  = 500;
          remote_s_portd  = 2152;

          # ------- SCTP definitions
          SCTP :
          {
              # Number of streams to use in input/output
              SCTP_INSTREAMS  = 2;
              SCTP_OUTSTREAMS = 2;
          };


          ////////// AMF parameters:
          amf_ip_address      = ( { ipv4       = "172.20.0.200";
                                    ipv6       = "192:168:30::17";
                                    active     = "yes";
                                    preference = "ipv4";
                                  }
                                );


          NETWORK_INTERFACES :
          {
            GNB_INTERFACE_NAME_FOR_NG_AMF            = "n2";
            GNB_IPV4_ADDRESS_FOR_NG_AMF              = "172.20.0.210";
            GNB_INTERFACE_NAME_FOR_NGU               = "n3";
            GNB_IPV4_ADDRESS_FOR_NGU                 = "172.20.0.211";
            GNB_PORT_FOR_S1U                         = 2152; # Spec 2152
          };
        }
      );

      security = {
        # preferred ciphering algorithms
        # the first one of the list that an UE supports in chosen
        # valid values: nea0, nea1, nea2, nea3
        ciphering_algorithms = ( "nea0" );

        # preferred integrity algorithms
        # the first one of the list that an UE supports in chosen
        # valid values: nia0, nia1, nia2, nia3
        integrity_algorithms = ( "nia2", "nia0" );

        # setting 'drb_ciphering' to "no" disables ciphering for DRBs, no matter
        # what 'ciphering_algorithms' configures; same thing for 'drb_integrity'
        drb_ciphering = "yes";
        drb_integrity = "no";
      };

      log_config : {
        global_log_level                      ="debug";
        hw_log_level                          ="debug";
        phy_log_level                         ="debug";
        mac_log_level                         ="debug";
        rlc_log_level                         ="debug";
        pdcp_log_level                        ="debug";
        rrc_log_level                         ="debug";
        f1ap_log_level                        ="debug";
        ngap_log_level                        ="debug";
      };
